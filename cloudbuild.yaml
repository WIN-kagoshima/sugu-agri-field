steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:$SHORT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:latest
      - .
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sugu-agri-field
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=$_SERVICE_ACCOUNT
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=60s
      - --set-env-vars=LOG_LEVEL=info,MCP_BASE_URL=$_MCP_BASE_URL
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _REGION: asia-northeast1
  _REPO: sugu-mcp
  _SERVICE_ACCOUNT: sugu-agri-field-runtime@$PROJECT_ID.iam.gserviceaccount.com
  _MCP_BASE_URL: https://mcp.sugukuru.dev
images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:latest
