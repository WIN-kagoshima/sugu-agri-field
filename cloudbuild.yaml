steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:$BUILD_ID
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:latest
      - .
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sugu-agri-field
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:$BUILD_ID
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=$_SERVICE_ACCOUNT
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=60s
      - --set-env-vars=LOG_LEVEL=info,MCP_BASE_URL=$_MCP_BASE_URL,SUGU_TRUST_PROXY=1,SUGU_RATE_RPS=15,SUGU_RATE_BURST=45
      - --set-secrets=SUGU_TOKEN_ENC_KEY=$_TOKEN_ENC_SECRET:latest,SESSION_COOKIE_SECRET=$_SESSION_COOKIE_SECRET:latest
options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
substitutions:
  _REGION: asia-northeast1
  _REPO: sugu-mcp
  _SERVICE_ACCOUNT: sugu-agri-runtime@${PROJECT_ID}.iam.gserviceaccount.com
  _TOKEN_ENC_SECRET: sugu-token-enc-key
  _SESSION_COOKIE_SECRET: sugu-session-cookie-secret
images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:$BUILD_ID
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/sugu-agri-field:latest
