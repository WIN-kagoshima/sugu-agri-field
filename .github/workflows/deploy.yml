name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  REPOSITORY: agriops-mcp
  SERVICE: agriops-mcp
  MCP_BASE_URL: ${{ secrets.MCP_BASE_URL }}
  GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
  SNAPSHOT_BUCKET: ${{ secrets.SNAPSHOT_BUCKET }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate deployment inputs
        run: |
          test -n "$PROJECT_ID"
          test -n "$MCP_BASE_URL"
          test -n "$GCP_RUNTIME_SERVICE_ACCOUNT"
          test -n "$SNAPSHOT_BUCKET"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install smoke-test dependencies
        run: npm ci --ignore-scripts

      - name: Run deploy preflight
        run: |
          npm run deploy:preflight -- \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --runtime-service-account="$GCP_RUNTIME_SERVICE_ACCOUNT" \
            --snapshot-bucket="$SNAPSHOT_BUCKET"

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project=$PROJECT_ID \
            --substitutions=_REGION=$REGION,_REPO=$REPOSITORY,_MCP_BASE_URL=$MCP_BASE_URL,_SERVICE_ACCOUNT=$GCP_RUNTIME_SERVICE_ACCOUNT,_TOKEN_ENC_SECRET=agriops-token-enc-key,_SESSION_COOKIE_SECRET=agriops-session-cookie-secret,_SNAPSHOT_BUCKET=$SNAPSHOT_BUCKET \
            --region=$REGION

      - name: Print Cloud Run URL
        run: |
          gcloud run services describe $SERVICE \
            --region=$REGION --format='value(status.url)'

      - name: Smoke test Cloud Run
        run: |
          TOKEN="$(gcloud auth print-identity-token)"
          npm run deploy:smoke -- \
            --base-url="$MCP_BASE_URL" \
            --health-path=/livez \
            --auth-bearer="$TOKEN"
