name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  REPOSITORY: agriops-mcp
  SERVICE: agriops-mcp
  MCP_BASE_URL: ${{ secrets.MCP_BASE_URL }}
  GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
  SNAPSHOT_BUCKET: ${{ secrets.SNAPSHOT_BUCKET }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate and normalise deployment inputs
        run: |
          # Strip CR/LF that often sneak in when secrets are pasted with a trailing newline
          PROJECT_ID="$(printf '%s' "$PROJECT_ID" | tr -d '\r\n' | xargs)"
          MCP_BASE_URL="$(printf '%s' "$MCP_BASE_URL" | tr -d '\r\n' | xargs)"
          GCP_RUNTIME_SERVICE_ACCOUNT="$(printf '%s' "$GCP_RUNTIME_SERVICE_ACCOUNT" | tr -d '\r\n' | xargs)"
          SNAPSHOT_BUCKET="$(printf '%s' "$SNAPSHOT_BUCKET" | tr -d '\r\n' | xargs)"
          test -n "$PROJECT_ID" || { echo "GCP_PROJECT_ID secret is empty"; exit 1; }
          test -n "$MCP_BASE_URL" || { echo "MCP_BASE_URL secret is empty"; exit 1; }
          test -n "$GCP_RUNTIME_SERVICE_ACCOUNT" || { echo "GCP_RUNTIME_SERVICE_ACCOUNT secret is empty"; exit 1; }
          test -n "$SNAPSHOT_BUCKET" || { echo "SNAPSHOT_BUCKET secret is empty"; exit 1; }
          {
            echo "PROJECT_ID=$PROJECT_ID"
            echo "MCP_BASE_URL=$MCP_BASE_URL"
            echo "GCP_RUNTIME_SERVICE_ACCOUNT=$GCP_RUNTIME_SERVICE_ACCOUNT"
            echo "SNAPSHOT_BUCKET=$SNAPSHOT_BUCKET"
          } >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          # Explicit project_id ensures the credentials file carries
          # quota_project_id, which Service Usage uses to authorize
          # cloudbuild.googleapis.com requests. Without it, gcloud falls back
          # to "no quota project" and Service Usage fails with
          # "user is forbidden from accessing the bucket [***_cloudbuild]".
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Pin gcloud project + quota project
        run: |
          gcloud config set core/project "$PROJECT_ID"
          gcloud config set billing/quota_project "$PROJECT_ID"
          echo "--- gcloud config ---"
          gcloud config list
          echo "--- effective active account ---"
          gcloud auth list --filter=status:ACTIVE --format='value(account)'

      - name: Install smoke-test dependencies
        run: npm ci --ignore-scripts

      - name: Run deploy preflight
        run: |
          npm run deploy:preflight -- \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --runtime-service-account="$GCP_RUNTIME_SERVICE_ACCOUNT" \
            --snapshot-bucket="$SNAPSHOT_BUCKET" \
            --skip-billing

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Print Cloud Build auth context
        run: |
          echo "Active account: $(gcloud auth list --filter=status:ACTIVE --format='value(account)')"
          echo "Quota project: $(gcloud config get-value billing/quota_project 2>/dev/null || echo unset)"

      - name: Submit Cloud Build
        # Use --no-source so `gcloud builds submit` does not upload a source
        # tarball to the managed *_cloudbuild staging bucket. Some org policies
        # block that bucket path even when the deployer can start Cloud Build.
        # cloudbuild.remote.yaml clones this repository inside Cloud Build,
        # restores snapshots from GCS, then builds/deploys the image.
        env:
          CLOUDSDK_BILLING_QUOTA_PROJECT: ${{ env.PROJECT_ID }}
        run: |
          gcloud builds submit \
            --no-source \
            --config=cloudbuild.remote.yaml \
            --project=$PROJECT_ID \
            --substitutions=_REGION=$REGION,_REPO=$REPOSITORY,_MCP_BASE_URL=$MCP_BASE_URL,_SERVICE_ACCOUNT=$GCP_RUNTIME_SERVICE_ACCOUNT,_TOKEN_ENC_SECRET=agriops-token-enc-key,_SESSION_COOKIE_SECRET=agriops-session-cookie-secret,_SNAPSHOT_BUCKET=$SNAPSHOT_BUCKET,_GIT_SHA=$GITHUB_SHA

      - name: Print Cloud Run URL
        run: |
          gcloud run services describe $SERVICE \
            --region=$REGION --format='value(status.url)'

      - name: Mint Cloud Run identity token
        id: cloud-run-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.MCP_BASE_URL }}
          id_token_include_email: true

      - name: Smoke test Cloud Run
        run: |
          npm run deploy:smoke -- \
            --base-url="$MCP_BASE_URL" \
            --health-path=/livez \
            --auth-bearer="${{ steps.cloud-run-auth.outputs.id_token }}"
